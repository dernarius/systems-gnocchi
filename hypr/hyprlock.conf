auth {
  pam:enabled = true
  fingerprint:enabled = true
}

background {
    monitor =
    path = screenshot   # Takes a screenshot of your current desktop
    blur_passes = 3     # How many times to apply the blur
    blur_size = 7       # The radius of the blur
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 50, 50
    outline_thickness = 0
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = true
    placeholder_text = 
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 100
    font_family = Monofur Nerd Font # Change to your preferred system font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT
    color = rgba(255, 255, 255, 1.0)
    font_size = 16
    font_family = Monofur Nerd Font
    position = 0, -80  # Negative Y pushes it below the center
    halign = center
    valign = center
}
